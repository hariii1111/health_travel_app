default: &default
  adapter: postgresql
  encoding: unicode
  host: db
  username: postgres
  password: password
  pool: 5

development:
  <<: *default
  database: health_travel_app_development

test:
  <<: *default
  database: health_travel_app_test

production:
  primary:
    <<: *default
    database: <%= ENV["DATABASE_URL"] %>

  cable:
    <<: *default
    database: <%= ENV["DATABASE_URL"] %>

  queue:
    <<: *default
    database: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *default
    database: <%= ENV["DATABASE_URL"] %>
